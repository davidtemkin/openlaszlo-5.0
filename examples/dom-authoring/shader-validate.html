<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>shader-validate — GLSL conformance (browser is the validator)</title>
</head>
<body style="font:14px ui-monospace,monospace;margin:16px">
  <h2>&lt;shader&gt; GLSL conformance</h2>
  <p>Each case below is generated by glsl-gen (the same code the compiler runs) and
     compiled with <code>gl.compileShader</code> on this machine's GL. All rows must be PASS.</p>
  <div id="out">running…</div>
  <script type="application/json" id="cases">{
  "minimal": "return vec4(uv, 0.5, 1.0);",
  "noise.snoise2v": "return vec4(vec3(noise.snoise2v(uv * 8.0)), 1.0);",
  "noise.snoise3v (chain: permute4, isqrtT4)": "return vec4(vec3(noise.snoise3v(vec3(uv, 0.5))), 1.0);",
  "noise.snoise4v (deep chain)": "return vec4(vec3(noise.snoise4v(vec4(uv, 0.5, 0.5))), 1.0);",
  "noise.cell2v": "let c = noise.cell2v(uv * 4.0);\nreturn vec4(c, 0.0, 1.0);",
  "pal.pal1..pal7 + time": "return pal.pal1(uv.x + time) * 0.2 + pal.pal4(uv.y) * 0.4 + pal.pal7(uv.x) * 0.4;",
  "color.hsla / hsva (branches, chained assign)": "return color.hsla(vec4(uv.x, 0.8, 0.5, 1.0)) * 0.5 + color.hsva(vec4(uv.y, 0.8, 0.5, 1.0)) * 0.5;",
  "shape SDFs (circle, box, roundbox, line)": "let d = shape.circle(uv, 0.5, 0.5, 0.3) + shape.box(uv, 0.1, 0.1, 0.4, 0.4) + shape.roundbox(uv, 0.2, 0.2, 0.3, 0.3, 0.05) + shape.line(uv, 0.0, 0.0, 1.0, 1.0, 0.01);\nreturn vec4(vec3(d), 1.0);",
  "shape 3D SDFs (torus, capsule, triangle)": "let p = vec3(uv, 0.5);\nlet d = shape.sdTorus(p, vec2(0.4, 0.1)) + shape.sdCapsule(p, vec3(0.0), vec3(1.0), 0.2) + shape.udTriangle(p, vec3(0.0), vec3(1.0, 0.0, 0.0), vec3(0.0, 1.0, 0.0));\nreturn vec4(vec3(d), 1.0);",
  "math.rotate2d / bezier2d / odd": "let r = math.rotate2d(uv, 1.5707);\nlet b = math.bezier2d(vec2(0.0), vec2(0.3, 1.0), vec2(0.7, 0.0), vec2(1.0), uv.x);\nreturn math.odd(floor(uv.x * 8.0)) ? vec4(r, b.x, 1.0) : vec4(b.zw, r.y, 1.0);",
  "for loop + helpers + mouse": "let acc = 0.0;\nfor (let i = 0; i < 6; i++) { acc = acc + noise.cheapnoise(uv + float(i) + mouse) * 0.15; }\nreturn vec4(vec3(acc), 1.0);",
  "uniforms (number+color)": "return vec4(pal.hsv2rgb(vec3(this.speed, 1.0, 1.0)) * this.tint, 1.0);"
}</script>
  <script type="module">
    import { glslGen } from "../../startup/lz-ts.js";

    const CASES = JSON.parse(document.getElementById("cases").textContent);

    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
    const rows = [];
    let failures = 0;
    for (const [label, code] of Object.entries(CASES)) {
      let status, detail = "";
      try {
        const r = glslGen({ color: { code, srcLine: 1 }, helpers: [],
          uniforms: [{ name: "speed", lzType: "number" }, { name: "tint", lzType: "color" }] });
        if (!r.ok) { status = "GEN-FAIL"; detail = r.findings.map(f => f.message).join("; "); }
        else if (!gl) { status = "NO-GL"; }
        else {
          const sh = gl.createShader(gl.FRAGMENT_SHADER);
          gl.shaderSource(sh, r.program.glsl);
          gl.compileShader(sh);
          if (gl.getShaderParameter(sh, gl.COMPILE_STATUS)) status = "PASS";
          else { status = "COMPILE-FAIL"; detail = gl.getShaderInfoLog(sh); console.error(label, r.program.glsl, detail); }
          gl.deleteShader(sh);
        }
      } catch (e) { status = "ERROR"; detail = String(e); }
      if (status !== "PASS") failures++;
      rows.push(`<tr><td style="color:${status === "PASS" ? "green" : "red"}">${status}</td><td>${label}</td><td>${detail}</td></tr>`);
    }
    document.getElementById("out").innerHTML =
      `<p><b>${failures === 0 ? "ALL PASS" : failures + " FAILURES"}</b></p>` +
      `<table border="1" cellpadding="4"><tr><th>status</th><th>case</th><th>detail</th></tr>${rows.join("")}</table>`;
  </script>
</body>
</html>
