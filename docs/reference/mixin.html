<h1><span class="ang">&lt;</span>mixin<span class="ang">&gt;</span></h1><p class="short">&lt;mixin&gt; is like
          &lt;class&gt; but rather than creating something you can
          instantiate, &lt;mixin&gt; creates a template that can be mixed
          in (added to) more than one other class. A &lt;mixin&gt; is
          like an interface, but it is allowed to have state and implementation.</p>
