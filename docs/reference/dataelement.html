<h1>LzDataElement</h1><p class="short">A node of hierarchical data.</p><p class="meta">Extends <a href="datanode.html"><code>LzDataNode</code></a></p>
        <p>
           An 
          <code>lz.DataElement</code>
           represents a node a in a hierarchical dataset.
 An 
          <code>lz.DataElement</code>
           can contain other 
          <code>lz.DataElements</code>
          ,
 or 
          <code>lz.DataText</code>
          , which
 represents a text node. See the example on 
          <code>lz.DataNodeMixin</code>
          . 
 
        </p>
