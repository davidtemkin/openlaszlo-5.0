<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OpenLaszlo — loading…</title>
<!--
  GitHub-Pages (and any 404-on-missing static host) bootstrap. A deep/shared link to a
  framed Explorer URL (e.g. /…/examples/calendar/) has NO real file, so the host serves
  this page. We bounce to the homepage — which installs the Service Worker — carrying the
  intended destination in ?goto so the Explorer can forward there once it's up.

  BASE (the deploy path prefix) must be known to build the homepage URL, but a 404 can't
  see where the site root is. So: prefer the BASE the homepage stored in localStorage on a
  prior visit (fully dynamic, correct at ANY deploy path); for a true first-time visitor,
  auto-detect (a *.github.io PROJECT page keeps its first path segment as the repo; a
  user/org page or custom domain is at root). No build step, no hardcoded repo name.
-->
<meta name="robots" content="noindex">
</head>
<body>
<script>
(function () {
  var segs = location.pathname.split("/").filter(Boolean);
  var stored = null;
  try { stored = localStorage.getItem("ol_base"); } catch (e) {}
  var base;
  if (stored) {
    base = stored;                                   // homepage has run here before → exact
  } else {
    var projectPage = location.hostname.indexOf(".github.io") > -1 && segs.length > 0;
    base = projectPage ? "/" + segs[0] + "/" : "/";  // first-timer fallback
  }
  // Distro-relative destination the visitor actually asked for (keep leading slash).
  var rel = location.pathname.indexOf(base) === 0
    ? location.pathname.slice(base.length - 1)
    : "/" + location.pathname.replace(/^\//, "");
  var goto = rel + location.search + location.hash;
  location.replace(base + "?goto=" + encodeURIComponent(goto));
})();
</script>
<noscript>This page requires JavaScript. Please open the site’s home page.</noscript>
</body>
</html>
