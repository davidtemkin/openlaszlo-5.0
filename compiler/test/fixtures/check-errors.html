      <script type="text/typescript">
        this.setAttribute('count', 'oops');
      </script>
    </handler>
    <handler name="onwidth" args="w">
      <script type="text/typescript">
        return this.cuont + w.toUpperCase();
      </script>
    </handler>
    <view width="${width - 10}" x="${parent.count + wat}"></view>
  </view>
  <view id="dup"></view>
  <view id="dup" bgcolor="notacolor!"></view>
</laszlo-app>
