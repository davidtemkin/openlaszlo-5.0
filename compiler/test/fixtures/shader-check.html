<laszlo-app width="400" height="300">
  <shader width="${parent.bogus}" height="300">
    <attribute name="speed" type="number" value="1"></attribute>
    <method name="color"><script type="text/typescript">
      let m = uv * 8.0;
      let ok = uv * 8.0;
      let bad = noise.snoise2v(badarg, 2.0);
      let un = this.notdeclared;
      return pal.pal1(m.xyz.x + ok.x + bad + un);
    </script></method>
  </shader>
  <view width="100" height="100">
    <method name="clientLeak"><script type="text/typescript">
      const v = vec4(1.0, 0.0, 0.0, 1.0); // vec4 leaked
      return v;
    </script></method>
  </view>
</laszlo-app>
