<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenLaszlo — Laszlo Explorer</title>
<link rel="icon" href="favicon.ico" sizes="any">
<!--
  The STATIC Laszlo Explorer bootstrap. Serve this `openlaszlo/` tree from any plain
  static host (S3, GitHub Pages, nginx, `python3 -m http.server`). This page registers
  the root-scope Service Worker (service-worker.js), which compiles every LZX app IN-BROWSER on
  demand — no dynamic server, no Java, nothing pre-compiled. Then it loads the Explorer
  in a full-page frame; from there the SW intercepts every `.lzx` you browse to.
  Requires a current browser (module Service Worker) over https:// or http://localhost.
-->
<style>
  html, body { height: 100%; margin: 0; background: #eaeaea;
    font: 14px/1.45 -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
  #explorer { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; display: none; }
  #boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; color: #556; text-align: center; padding: 24px; }
  #boot .logo { font-weight: 600; color: #2a5db0; font-size: 20px; letter-spacing: .2px; }
  #boot .sub { margin-top: 6px; color: #889; }
  #boot .spin { margin-top: 18px; width: 28px; height: 28px; border: 3px solid #ccd;
    border-top-color: #2a5db0; border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #err { display: none; position: fixed; inset: 0; padding: 32px; color: #511; background: #fee;
    font-family: ui-monospace, Menlo, monospace; white-space: pre-wrap; overflow: auto; }
</style>
</head>
<body>
  <div id="boot">
    <div class="logo">OpenLaszlo</div>
    <div class="sub">starting the in-browser compiler…</div>
    <div class="spin" aria-hidden="true"></div>
  </div>
  <iframe id="explorer" title="Laszlo Explorer"></iframe>
  <div id="err"></div>

  <script type="module">
    const boot = document.getElementById("boot");
    const errBox = document.getElementById("err");

    // BASE — this page's own directory. The whole distro is relative to it, so everything
    // adapts to WHATEVER URL serves index.html (origin root, /openlaszlo/ project page, …)
    // with no build step.
    const BASE = location.pathname.replace(/[^/]*$/, "");   // "/" | "/openlaszlo/" | …
    window.OL_BASE = BASE;   // read by the Explorer logo (back-to-home)

    function fail(msg) {
      boot.style.display = "none";
      errBox.style.display = "block";
      errBox.textContent = msg;
    }

    // ── Clean-URL routing (Scenario A — the address bar mirrors the content you're viewing).
    // The Explorer runs in the iframe and reports its nav location (a "|"-joined title path)
    // via window.olNav; we map that to a clean, shareable framed URL and pushState it. On a
    // deep link or browser back/forward we map the URL back to a title path and replay it
    // through the Explorer's existing openSequence (window.olGoto). The path↔node map is
    // derived from nav_dhtml.xml — no separate slug table. All adapts to BASE automatically.
    const slug = (s) => s.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    const byTitle = new Map();   // "Demos|Calendar" → framed pathname (e.g. /openlaszlo/examples/calendar/)
    const byFramed = new Map();  // framed pathname  → "Demos|Calendar"
    let suppressNav = false;     // true while WE drive the Explorer (don't echo back to the URL)
    let suppressHash = false;    // true while WE set location.hash (don't re-route from our own write)
    // The shareable address lives in the URL FRAGMENT, not the path. The path therefore stays
    // index.html on every link, so a deep/shared link can NEVER 404 and needs no host 404/rewrite
    // config (works the same on GitHub Pages, Firebase, S3, nginx, python -m http.server…). The
    // fragment carries the distro-relative content path; these map it to/from the framed pathname.
    const framedToRel = (framed) => framed.slice(BASE.length - 1);            // keeps a leading "/"
    const relToFramed = (rel) => (BASE.replace(/\/$/, "") + rel).replace(/\/?$/, "/");

    async function buildNavMap() {
      try {
        const xml = await (await fetch("nav_dhtml.xml")).text();   // SW serves it BASE-rebased
        const doc = new DOMParser().parseFromString(xml, "application/xml");
        const entries = [];
        (function walk(el, trail) {
          for (const c of Array.from(el.children)) {
            const name = c.getAttribute("name");
            const t = name ? trail.concat(name) : trail;
            if (name) entries.push({ key: t.join("|"), trail: t, src: c.getAttribute("src") });
            walk(c, t);
          }
        })(doc.documentElement, []);
        const dirCount = {};
        for (const e of entries) if (e.src) { const d = e.src.replace(/\/[^/]*$/, ""); dirCount[d] = (dirCount[d] || 0) + 1; }
        for (const e of entries) {
          let framed;
          if (e.src) {
            const d = e.src.replace(/\/[^/]*$/, "");
            // unique dir → tidy dir URL (/examples/calendar/); shared dir → keep the file stem
            // (/basics/hello/) so siblings don't collide. Mirrors the content path either way.
            const stem = (dirCount[d] === 1) ? d : e.src.replace(/\.[^/.]+$/, "");
            framed = stem.replace(/\/+$/, "") + "/";
          } else {
            framed = BASE + e.trail.map(slug).join("/") + "/";   // folder-only node → slug path
          }
          byTitle.set(e.key, framed);
          if (!byFramed.has(framed)) byFramed.set(framed, e.key);
        }
      } catch (e) { /* routing degrades to no-op; the Explorer still works */ }
    }

    const explorerWindow = () => { const f = document.getElementById("explorer"); return f && f.contentWindow; };
    function whenExplorerReady(cb, tries = 0) {
      const w = explorerWindow();
      if (w && w.olGoto) return cb();
      if (tries > 200) return;                  // ~20s budget
      setTimeout(() => whenExplorerReady(cb, tries + 1), 100);
    }
    function driveExplorer(titlePath) {
      whenExplorerReady(() => {
        suppressNav = true;
        try { explorerWindow().olGoto(titlePath); } catch (e) {}
        setTimeout(() => { suppressNav = false; }, 500);
      });
    }

    // Explorer → shell: mirror the current node into the URL fragment.
    window.olNav = function (titlePath) {
      if (suppressNav) return;
      const framed = byTitle.get(titlePath);
      if (!framed) return;
      const hash = "#" + framedToRel(framed);
      if (location.hash !== hash) { suppressHash = true; location.hash = hash; }
    };
    // shell ← URL: a deep/shared link, a pasted fragment, or browser back/forward.
    function routeFromHash() {
      const rel = decodeURIComponent(location.hash.replace(/^#/, ""));
      if (!rel) return;
      const tp = byFramed.get(relToFramed(rel));
      if (tp) driveExplorer(tp);
    }
    window.addEventListener("hashchange", () => {
      if (suppressHash) { suppressHash = false; return; }   // ignore our own writes
      routeFromHash();
    });

    async function loadExplorer() {
      await buildNavMap();
      const f = document.getElementById("explorer");
      f.addEventListener("load", () => {
        boot.style.display = "none"; f.style.display = "block";
        routeFromHash();   // drive the Explorer to the fragment's node (deep link / refresh)
      }, { once: true });
      // The Explorer's source lives under explorer/; the SW maps the `/`-namespace URL
      // `explore-nav.lzx` → explorer/explore-nav.lzx and compiles it in-browser.
      f.src = "explore-nav.lzx";
    }

    (async () => {
      if (!("serviceWorker" in navigator)) {
        return fail("This browser does not support Service Workers, which the static Laszlo "
          + "Explorer needs to compile LZX in the browser.\n\nUse a current Chrome / Edge / "
          + "Firefox / Safari over https:// (or http://localhost), or run the bundled Node server.");
      }
      // A new deploy: the freshly-activated SW (new BUILD_ID) clears caches and posts its
      // build id. If it differs from the one this page booted with, reload once onto the
      // fresh version. Set-before-reload + sessionStorage guards against reload loops.
      navigator.serviceWorker.addEventListener("message", (e) => {
        if (!e.data || e.data.type !== "ol-updated") return;
        const seen = sessionStorage.getItem("ol-build");
        sessionStorage.setItem("ol-build", e.data.build);
        if (seen && seen !== e.data.build) location.reload();
      });
      // COMPILE MODE — the live Node server injects `window.__OL_COMPILE="server"` into the
      // index.html it serves; a dumb static host serves this file verbatim → undefined →
      // "browser" (safe default). The mode rides on the SW's registration URL so the worker
      // reads it from its own location. Same distro, two modes, no host-probing.
      const COMPILE = (self.__OL_COMPILE === "server") ? "server" : "browser";
      let reg;
      try {
        reg = await navigator.serviceWorker.register("./service-worker.js?compile=" + COMPILE, { type: "module", scope: "./", updateViaCache: "none" });
      } catch (e) {
        return fail("Service Worker registration failed — likely a browser without MODULE "
          + "service-worker support.\n\n" + (e && e.message ? e.message : e)
          + "\n\nTry a current browser, or run the bundled Node server.");
      }
      await navigator.serviceWorker.ready;
      if (reg) reg.update().catch(() => {});   // force an update check each load → prompt pickup of new deploys

      // A SW does not control the page that registered it until it claims clients. The SW
      // calls clients.claim() on activate, which fires `controllerchange` here. WAIT for that
      // (so the Explorer iframe we create is intercepted) rather than reloading — a reload
      // re-fetches index.html and cold-restarts the worker, the bulk of the first-visit gap.
      // Fallbacks keep first load bulletproof: claim already landed, or (rare) no event in 2s
      // → reload once (guarded against loops by ol-sw-reloaded).
      if (!navigator.serviceWorker.controller) {
        await new Promise((resolve) => {
          navigator.serviceWorker.addEventListener("controllerchange", () => resolve(), { once: true });
          if (navigator.serviceWorker.controller) return resolve();
          setTimeout(() => {
            if (navigator.serviceWorker.controller || sessionStorage.getItem("ol-sw-reloaded")) return resolve();
            sessionStorage.setItem("ol-sw-reloaded", "1");
            location.reload();
          }, 2000);
        });
      }
      loadExplorer();
    })().catch((e) => fail("Bootstrap error:\n" + (e && e.stack ? e.stack : e)));
  </script>
</body>
</html>
